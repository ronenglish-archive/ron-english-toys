      box-shadow:0 6px 18px rgba(0,0,0,0.08);
      transition:transform 120ms ease, box-shadow 120ms ease;
      color:inherit;

    .year-card:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 26px rgba(0,0,0,0.12);
    }

    .year-card img{
      display:block;
      width:100%;
      height:230px;
      object-fit:contain;
      background:#f3f4f6;
      padding:8px;

      text-align:center;
