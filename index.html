<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sculptures, Toys &amp; Editions | Ron English Catalogue Raisonne</title>
  <link rel="stylesheet" href="css/styles.css" />

  <style>
    :root{
      --muted:#4b5563;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      color:#111;
      background:#fff;
    }

    .page-container{
      max-width:1100px;
      margin:0 auto;
      padding:28px 18px 60px;
      box-sizing:border-box;
    }

    .top-nav{
      margin-top:22px;
      margin-bottom:22px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .nav-pills{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }

    .page-header{
      max-width:1100px;
      margin:0;
      padding:0;
      text-align:center;
    }

    .page-title{
      margin:0 0 10px;
      font-size:clamp(2rem,4vw,3rem);
      letter-spacing:-.02em;
      line-height:1.05;
      text-align:center;
    }

    .intro-text{
      max-width:900px;
      margin:0 auto 28px;
      padding:0;
      line-height:1.6;
      text-align:center;
    }

    .intro-text p{
      margin:0 0 14px;
      max-width:none;
      width:100%;
      color:var(--muted);
      font-size:18px;
      text-align:center;
    }

    .catalogue-search{
      max-width:640px;
      margin:0 auto 24px;
      text-align:center;
    }

    .catalogue-search label{
      display:block;
      margin:0 0 8px;
      font-size:.9rem;
      color:var(--muted);
    }

    .catalogue-search input{
      width:100%;
      min-height:46px;
      border:1px solid rgba(0,0,0,0.14);
      border-radius:999px;
      padding:0 18px;
      font-size:1rem;
      text-align:center;
      background:#fff;
      color:#111;
      box-shadow:0 6px 18px rgba(0,0,0,0.06);
    }

    .year-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:18px;
      justify-items:center;
      align-items:stretch;
      margin-top:26px;
    }

    .year-card{
      display:flex;
      flex-direction:column;
      width:100%;
      max-width:260px;
      text-decoration:none;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(0,0,0,0.12);
      background:rgba(255,255,255,0.98);
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
      transition:transform 120ms ease, box-shadow 120ms ease;
      color:inherit;
    }

    .year-card:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 26px rgba(0,0,0,0.12);
    }

    .year-card img{
      display:block;
      width:100%;
      height:230px;
      object-fit:contain;
      background:#f3f4f6;
      padding:8px;
    }

    .year-card-body{
      padding:12px 14px 14px;
      text-align:center;
    }

    .year-grid .year-card .year-card-title{
      display:block;
      width:100%;
      text-align:center !important;
      margin:0 auto;
      font-size:1.05rem;
      line-height:1.2;
    }

    .site-footer{
      margin-top:42px;
      text-align:center;
      color:var(--muted);
      font-size:.92rem;
    }

/* Homepage section-card centering v4 - start */
/*
  Center the three landing cards on the Sculptures, Toys & Editions homepage.
  This targets only the homepage section cards by their link destinations.
*/

main a[href*="sculptures"],
main a[href*="art-toys-and-editions"],
main a[href*="custom-toys"] {
  width: min(100%, 360px) !important;
  max-width: 360px !important;
  min-width: 0 !important;
  justify-self: center !important;
  align-self: start !important;
  margin-left: 0 !important;
  margin-right: 0 !important;
  box-sizing: border-box !important;
}

/* Override the earlier Custom Toys wide-card rule/inline style. */
main a[href*="custom-toys"] {
  grid-column: 1 / -1 !important;
  justify-self: center !important;
  margin-left: auto !important;
  margin-right: auto !important;
  width: min(100%, 360px) !important;
  max-width: 360px !important;
  flex: 0 1 360px !important;
}

/*
  Common generated catalogue grid names.
  The :has() selector limits these rules to the homepage grid that contains
  the three section cards, instead of affecting every index page.
*/
.year-grid:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]),
.section-grid:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]),
.category-grid:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]),
.portal-grid:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]),
.card-grid:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]),
.cards-grid:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]),
.home-grid:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]),
.landing-grid:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]),
main section:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]) {
  display: grid !important;
  grid-template-columns: repeat(2, minmax(280px, 360px)) !important;
  justify-content: center !important;
  justify-items: center !important;
  align-items: start !important;
  gap: 1.5rem !important;
  max-width: 820px !important;
  margin-left: auto !important;
  margin-right: auto !important;
}

/* On small screens, stack all cards neatly. */
@media (max-width: 759px) {
  .year-grid:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]),
  .section-grid:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]),
  .category-grid:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]),
  .portal-grid:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]),
  .card-grid:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]),
  .cards-grid:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]),
  .home-grid:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]),
  .landing-grid:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]),
  main section:has(a[href*="sculptures"]):has(a[href*="art-toys-and-editions"]):has(a[href*="custom-toys"]) {
    grid-template-columns: minmax(260px, 360px) !important;
    max-width: 420px !important;
  }

  main a[href*="custom-toys"] {
    grid-column: auto !important;
  }
}
/* Homepage section-card centering v4 - end */
</style>
</head>

<body class="decade-overview-page">
  <div class="page-container">

        <nav class="top-nav" aria-label="Site navigation">
      <a class="nav-home nav-pill" href="https://ronenglish-archive.github.io/ron-english-catalogue-raisonne/">Catalogue home</a>
    </nav>

    <header class="page-header">
      <h1 class="page-title">Sculptures, Toys &amp; Editions</h1>
    </header>

    <section class="intro-text" aria-label="Sculptures, Toys &amp; Editions overview">
      <p>A working catalogue section for documented Ron English sculptural works, art toys, editioned objects, and custom toy-based works.</p>
    </section>

<main class="gallery-wrap">
      <section class="year-grid" role="list" aria-label="Sculptures, Toys &amp; Editions links grid">
        <a class="year-card searchable-card" href="sculptures/index.html" data-title="Sculptures">
          <img src="images/Trampt/BIGFOOT%20CHILD%20TOURIST%20(NFS)%20-%20Original%20Art%20-%20Trampt%20item%20921.jpg" alt="Sculptures by Ron English" loading="lazy" />
          <div class="year-card-body"><h2 class="year-card-title">Sculptures</h2></div>
        </a>
        <a class="year-card searchable-card" href="toys/art-toys-and-editions/index.html" data-title="Art Toys &amp; Editions">
          <img src="images/Trampt/Big%20Yang%20%26%20The%20Yang%20Bangers%20-%20Original%20-%20DESIGNER%20TOY.jpeg" alt="Art Toys &amp; Editions by Ron English" loading="lazy" />
          <div class="year-card-body"><h2 class="year-card-title">Art Toys &amp; Editions</h2></div>
        </a>
        <a class="year-card searchable-card custom-toys-home-card custom-toys-home-card-centered" href="toys/custom-toys/index.html" data-title="Custom Toys" style="grid-column: 1 / -1; justify-self: center; margin-left: auto; margin-right: auto; max-width: 520px; width: min(100%, 520px);">
          <img src="images/Trampt/D&#39;oh!%20Boy%20-%20Traditional%20-%20Custom%20Toy%20-%20Trampt%20item%20868.jpg" alt="Custom Toys by Ron English" loading="lazy" />
          <div class="year-card-body"><h2 class="year-card-title">Custom Toys</h2></div>
        </a>
      </section>
    </main>

    <footer class="site-footer">
      <p>Ron English Catalogue Raisonne - Sculptures, Toys &amp; Editions</p>
    </footer>

  </div>

  <script>
    (function(){
      var input = document.getElementById('catalogueSearch');
      if (!input) return;
      var cards = Array.prototype.slice.call(document.querySelectorAll('.searchable-card'));
      input.addEventListener('input', function(){
        var q = input.value.toLowerCase().trim();
        cards.forEach(function(card){
          var title = (card.getAttribute('data-title') || '').toLowerCase();
          card.style.display = (!q || title.indexOf(q) !== -1) ? '' : 'none';
        });
      });
    })();
  </script>
</body>
</html>
